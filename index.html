    <title>Itain‑Bell Schools | Getting Better Every Day</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages — https://github.com/rafgraph/spa-github-pages
      // Decodes the path that 404.html re-encoded into the query string and restores
      // the real URL via history.replaceState before React Router mounts.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search.slice(1).split("&").map(function (s) {
            return s.replace(/~and~/g, "&");
          }).join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <meta name="description" content="Itain-Bell Schools provides quality Montessori and British-Nigerian education in Lagos, Nigeria. Crèche, Nursery and Primary admissions open." />
    <meta name="author" content="Itain-Bell Schools" />
