<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Itain‑Bell Schools</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages — https://github.com/rafgraph/spa-github-pages
      // GitHub Pages can't route client-side paths like /login or /dashboard on
      // direct visits or refreshes, so it serves this 404 page. We re-encode the
      // path into a query string and redirect to the real index.html, which then
      // decodes it back (see the script in index.html) so React Router can take over.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
        l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
